Screens:
  ScreenAgenda:
    Properties:
      Fill: =ColorValue("#F6F8FB")
      OnVisible: |-
        =Set(varIsInitialLoad, true);
        Set(varConference, First(Conférences));
        ClearCollect(
            colRoomsAll,
            Filter(Salles, mwcp26_ConferenceId.mwcp26_conferenceid = varConference.mwcp26_conferenceid)
        );
        ClearCollect(colRoomsSorted, Sort(colRoomsAll, mwcp26_name));
        ClearCollect(
            colRooms,
            ForAll(
                Sequence(CountRows(colRoomsSorted)),
                With(
                    {RoomRow: Index(colRoomsSorted, Value)},
                    {
                        RoomId: RoomRow.mwcp26_salleid,
                        RoomName: RoomRow.mwcp26_name,
                        RoomColor: Switch(
                            Mod(Value - 1, 5),
                            0, ColorValue("#00AEF0"),
                            1, ColorValue("#80CD28"),
                            2, ColorValue("#FABC09"),
                            3, ColorValue("#F2521B"),
                            ColorValue("#2F74DE")
                        )
                    }
                )
            )
        );
        ClearCollect(
            colSessionsRaw,
            AddColumns(
                Filter(Sessions, mwcp26_ConferenceId.mwcp26_conferenceid = varConference.mwcp26_conferenceid),
                RoomGuid, mwcp26_SalleId.mwcp26_salleid
            )
        );
        ClearCollect(
            colSessions,
            ForAll(
                colSessionsRaw As SessionRow,
                With(
                    {
                        RoomMatch: LookUp(colRooms, RoomId = SessionRow.RoomGuid),
                        SpeakerRows: Filter('Intervenants de Session', mwcp26_SessionId.mwcp26_sessionid = SessionRow.mwcp26_sessionid)
                    },
                    {
                        SessionId: SessionRow.mwcp26_sessionid,
                        Title: SessionRow.mwcp26_name,
                        Description: SessionRow.mwcp26_description,
                        StartDateTime: SessionRow.mwcp26_startdatetime,
                        EndDateTime: SessionRow.mwcp26_enddatetime,
                        HasRoom: !IsBlank(SessionRow.mwcp26_SalleId),
                        RoomId: RoomMatch.RoomId,
                        RoomName: RoomMatch.RoomName,
                        RoomColor: If(IsBlank(RoomMatch.RoomColor), ColorValue("#8A909B"), RoomMatch.RoomColor),
                        SpeakerNames: Concat(SpeakerRows, mwcp26_SpeakerId.fullname, ", "),
                        HasSpeakers: CountRows(SpeakerRows) > 0,
                        DurationMinutes: If(
                            IsBlank(SessionRow.mwcp26_startdatetime) || IsBlank(SessionRow.mwcp26_enddatetime),
                            Blank(),
                            RoundDown((SessionRow.mwcp26_enddatetime - SessionRow.mwcp26_startdatetime) * 24 * 60, 0)
                        )
                    }
                )
            )
        );
        ClearCollect(
            colDayDatesRaw,
            Sort(
                Distinct(Filter(colSessions, !IsBlank(StartDateTime)), DateValue(StartDateTime)),
                Value
            )
        );
        ClearCollect(
            colDays,
            ForAll(
                Sequence(CountRows(colDayDatesRaw)),
                With(
                    {DayDateValue: DateValue(Index(colDayDatesRaw, Value).Value)},
                    {
                        DayIndex: Value,
                        DayDate: DayDateValue,
                        DayLabel: "Jour " & Value,
                        DaySubLabel: Upper(Left(Text(DayDateValue, "ddd d mmm", "fr-FR"), 1)) & Mid(Text(DayDateValue, "ddd d mmm", "fr-FR"), 2)
                    }
                )
            )
        );
        Set(
            varSelectedDayDate,
            With(
                {TodayMatch: LookUp(colDays, DayDate = Today())},
                If(IsBlank(TodayMatch), First(colDays).DayDate, TodayMatch.DayDate)
            )
        );
        Set(varSelectedRoomId, Blank());
        Set(varSearchText, "");
        Set(varIsInitialLoad, false)
    Children:
